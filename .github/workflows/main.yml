name: Lotto_Auto_Update_V3

on:
  schedule:
    # 台灣時間每天晚上 22:30 執行 (國際時間 14:30)
    - cron: '30 14 * * *'
  workflow_dispatch: # 讓你可以隨時點擊按鈕手動測試更新

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出儲存庫代碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝爬蟲必要套件
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 執行爬蟲腳本
        run: python crawler.py

     - name: 將更新後的數據存回 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main # 先拉取遠端變動，避免衝突
          git add data.json
          # 檢查是否有檔案變動，有才提交
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "自動更新獎號數據: $(date)"
            git push https://${{ title_token }}@github.com/${{ github.repository }}.git main
          else
            echo "沒有新數據，跳過更新"
          fi
        env:
          title_token: ${{ secrets.GITHUB_TOKEN }}
