<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩券水位規律分析儀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ball { @apply w-8 h-8 rounded-full flex items-center justify-center text-white font-bold shadow-sm; }
        .ball-red { background: radial-gradient(circle at 30% 30%, #ff5f6d, #ff3131); }
        .ball-blue { background: radial-gradient(circle at 30% 30%, #2193b0, #6dd5ed); }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-black text-slate-800 border-l-4 border-blue-600 pl-3">數據規律監測站</h1>
            
            <div class="flex items-center gap-2">
                <span class="text-gray-600 font-medium">切換遊戲：</span>
                <select id="gameSelect" class="bg-white border border-gray-300 rounded-lg px-4 py-2 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="649">大樂透 (6/49)</option>
                    <option value="539">今彩 539</option>
                </select>
            </div>
        </div>

        <div id="status" class="text-xs text-gray-400 mb-4 text-right">正在連線至數據庫...</div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <table class="w-full text-center">
                <thead class="bg-slate-800 text-white text-sm">
                    <tr>
                        <th class="p-4">期別/日期</th>
                        <th class="p-4">開獎號碼 (由小到大)</th>
                        <th class="p-4">水位 (Sum)</th>
                    </tr>
                </thead>
                <tbody id="resultBody" class="divide-y divide-gray-100 text-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let rawData = null;

        // 1. 初始化讀取
        async function init() {
            try {
                const res = await fetch(`./data.json?t=${Date.now()}`);
                if (!res.ok) throw new Error("尚未偵測到 data.json");
                rawData = await res.json();
                
                document.getElementById('status').innerText = `最後同步時間: ${new Date().toLocaleString()}`;
                
                // 首次渲染
                renderTable('649');
                
                // 2. 綁定下拉選單事件 (關鍵修復)
                document.getElementById('gameSelect').addEventListener('change', (e) => {
                    renderTable(e.target.value);
                });

            } catch (e) {
                document.getElementById('status').innerHTML = `<span class="text-red-500 font-bold">❌ 錯誤: ${e.message}</span>`;
            }
        }

        // 3. 渲染邏輯
        function renderTable(gameType) {
            const list = rawData[gameType] || [];
            const container = document.getElementById('resultBody');
            
            if (list.length === 0) {
                container.innerHTML = `<tr><td colspan="3" class="p-10 text-gray-400">目前尚無 ${gameType} 數據</td></tr>`;
                return;
            }

            container.innerHTML = list.map(item => {
                const sum = item.nums.reduce((a, b) => a + b, 0);
                const ballsHtml = item.nums.map(n => `<div class="ball ${gameType === '649' ? 'ball-blue' : 'ball-red'}">${n}</div>`).join('');
                const spHtml = item.sp ? `<div class="text-xs text-gray-400 mt-1">特別號: <span class="text-red-500 font-bold">${item.sp}</span></div>` : '';

                return `
                    <tr class="hover:bg-blue-50 transition-colors">
                        <td class="p-4">
                            <div class="font-bold text-slate-900">${item.id}</div>
                            <div class="text-xs text-gray-400">${item.date}</div>
                        </td>
                        <td class="p-4">
                            <div class="flex justify-center gap-2">${ballsHtml}</div>
                            ${spHtml}
                        </td>
                        <td class="p-4 font-mono font-bold text-lg text-blue-600">
                            ${sum}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        init();
    </script>
</body>
</html>
